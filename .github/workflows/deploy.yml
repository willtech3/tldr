name: Deploy Slack Message Summarizer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            ./bolt-ts/package-lock.json
            ./cdk/package-lock.json

      # ---- Bolt Lambda (TypeScript) ----
      - name: Install Bolt dependencies
        working-directory: ./bolt-ts
        run: npm ci

      - name: Lint Bolt Lambda
        working-directory: ./bolt-ts
        run: npm run lint

      - name: Build Bolt Lambda
        working-directory: ./bolt-ts
        run: npm run build

      - name: Test Bolt Lambda
        working-directory: ./bolt-ts
        run: npm test

      # ---- CDK ----
      - name: Install CDK dependencies
        working-directory: ./cdk
        run: npm ci

      - name: Lint CDK
        working-directory: ./cdk
        run: npm run lint

      - name: Build CDK
        working-directory: ./cdk
        run: npm run build

      # ---- Package + Deploy (main only) ----
      - name: Package Bolt Lambda bundle
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        working-directory: ./bolt-ts
        run: npm run bundle

      - name: Configure AWS credentials with OIDC
        id: configure-aws-oidc
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tldr-github-actions
          role-duration-seconds: 3600
          mask-aws-account-id: true
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

      - name: Configure AWS credentials with access keys
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.configure-aws-oidc.outcome != 'success'

      # The runtime Lambda reads bot token, signing secret, and Anthropic API
      # key from SSM SecureString parameters. Sync them from GitHub Actions
      # secrets on every deploy so SSM and GH-secrets-as-source-of-truth never
      # drift, and so a freshly-added/rotated secret takes effect on the next
      # Lambda cold start without manual `aws ssm put-parameter` calls.
      #
      # `continue-on-error: true` so a missing `ssm:PutParameter` permission on
      # the deploy role does not block the CDK deploy itself. If this step
      # fails, populate SSM manually (`aws ssm put-parameter --overwrite
      # --type SecureString --name <name> --value <secret>`) and the next
      # Lambda cold start will pick it up.
      - name: Sync secrets to SSM
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN:                     ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET:                ${{ secrets.SLACK_SIGNING_SECRET }}
          ANTHROPIC_API_KEY:                   ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN_PARAMETER_NAME:      ${{ vars.SLACK_BOT_TOKEN_PARAMETER_NAME || '/tldr/slack/bot-token' }}
          SLACK_SIGNING_SECRET_PARAMETER_NAME: ${{ vars.SLACK_SIGNING_SECRET_PARAMETER_NAME || '/tldr/slack/signing-secret' }}
          ANTHROPIC_API_KEY_PARAMETER_NAME:    ${{ vars.ANTHROPIC_API_KEY_PARAMETER_NAME || '/tldr/anthropic/api-key' }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "${SLACK_BOT_TOKEN:-}" ]      || missing+=("SLACK_BOT_TOKEN")
          [ -n "${SLACK_SIGNING_SECRET:-}" ] || missing+=("SLACK_SIGNING_SECRET")
          [ -n "${ANTHROPIC_API_KEY:-}" ]    || missing+=("ANTHROPIC_API_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub Actions secrets: ${missing[*]}"
            exit 1
          fi
          aws ssm put-parameter --overwrite --type SecureString \
            --name "$SLACK_BOT_TOKEN_PARAMETER_NAME"      --value "$SLACK_BOT_TOKEN" >/dev/null
          aws ssm put-parameter --overwrite --type SecureString \
            --name "$SLACK_SIGNING_SECRET_PARAMETER_NAME" --value "$SLACK_SIGNING_SECRET" >/dev/null
          aws ssm put-parameter --overwrite --type SecureString \
            --name "$ANTHROPIC_API_KEY_PARAMETER_NAME"    --value "$ANTHROPIC_API_KEY" >/dev/null
          echo "Synced SLACK_BOT_TOKEN, SLACK_SIGNING_SECRET, ANTHROPIC_API_KEY to SSM."

      - name: Deploy with CDK
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        working-directory: ./cdk
        run: |
          npm run cdk deploy -- --require-approval never --outputs-file cdk-outputs.json
          echo "📌 API Gateway URL for Slack manifest:"
          python3 -c "import json; data = json.load(open('cdk-outputs.json')); print(data['TldrStack']['ApiGatewayUrl'])"
          echo "ℹ️  Update your Slack app manifest with this URL at api.slack.com/apps"
        env:
          SLACK_BOT_TOKEN_PARAMETER_NAME:      ${{ vars.SLACK_BOT_TOKEN_PARAMETER_NAME || '/tldr/slack/bot-token' }}
          SLACK_SIGNING_SECRET_PARAMETER_NAME: ${{ vars.SLACK_SIGNING_SECRET_PARAMETER_NAME || '/tldr/slack/signing-secret' }}
          ANTHROPIC_API_KEY_PARAMETER_NAME:    ${{ vars.ANTHROPIC_API_KEY_PARAMETER_NAME || '/tldr/anthropic/api-key' }}
          ANTHROPIC_MODEL:                     ${{ vars.ANTHROPIC_MODEL }}
          ANTHROPIC_MAX_OUTPUT_TOKENS:         ${{ vars.ANTHROPIC_MAX_OUTPUT_TOKENS }}
          CDK_DEFAULT_REGION:                  ${{ env.AWS_REGION }}
          AWS_ACCOUNT_ID:                      ${{ vars.AWS_ACCOUNT_ID }}
          ENABLE_STREAMING:                    'true'
